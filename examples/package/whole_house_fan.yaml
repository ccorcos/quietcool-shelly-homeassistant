# YAML package fallback for users who do not want the HACS integration.
# Replace these entity IDs with your actual switch entities:
#   switch.whf_power
#   switch.whf_speed_a
#   switch.whf_speed_b

input_select:
  whf_speed:
    name: House Fan Speed
    options:
      - Low
      - Medium
      - High
    initial: Low
    icon: mdi:fan

input_number:
  whf_run_hours:
    name: House Fan Run Time
    min: 0.5
    max: 12
    step: 0.5
    mode: box
    unit_of_measurement: h
    icon: mdi:timer-outline

timer:
  whf_run_timer:
    name: House Fan Timer
    restore: true

template:
  - fan:
      - name: House Fan
        unique_id: house_fan_virtual
        state: "{{ is_state('switch.whf_power', 'on') }}"
        preset_mode: "{{ states('input_select.whf_speed') }}"
        preset_modes:
          - Low
          - Medium
          - High
        turn_on:
          action: script.whf_turn_on
        turn_off:
          action: script.whf_turn_off
        set_preset_mode:
          action: script.whf_set_speed
          data:
            preset_mode: "{{ preset_mode }}"

  - button:
      - name: Start House Fan Timer
        unique_id: start_house_fan_timer
        icon: mdi:timer-play-outline
        press:
          action: script.whf_start_timer

  - switch:
      - name: House Fan Timed Run
        unique_id: house_fan_timed_run
        icon: mdi:timer-outline
        state: "{{ is_state('timer.whf_run_timer', 'active') }}"
        turn_on:
          action: script.whf_start_timer
        turn_off:
          action: script.whf_stop_timer

script:
  whf_turn_on:
    alias: House Fan - Turn On
    mode: restart
    sequence:
      - action: script.whf_apply_speed_only
        data:
          preset_mode: "{{ states('input_select.whf_speed') }}"
      - action: switch.turn_on
        target:
          entity_id: switch.whf_power

  whf_turn_off:
    alias: House Fan - Turn Off
    mode: restart
    sequence:
      - action: timer.cancel
        target:
          entity_id: timer.whf_run_timer
      - action: switch.turn_off
        target:
          entity_id: switch.whf_power

  whf_set_speed:
    alias: House Fan - Set Speed
    mode: restart
    fields:
      preset_mode:
        name: Preset mode
        required: true
        example: Low
    sequence:
      - variables:
          requested_speed: "{{ preset_mode | default(states('input_select.whf_speed')) }}"
      - condition: template
        value_template: "{{ requested_speed in ['Low', 'Medium', 'High'] }}"
      - action: input_select.select_option
        target:
          entity_id: input_select.whf_speed
        data:
          option: "{{ requested_speed }}"
      - action: script.whf_apply_speed_only
        data:
          preset_mode: "{{ requested_speed }}"

  whf_apply_speed_only:
    alias: House Fan - Apply Speed Relay State Only
    mode: restart
    fields:
      preset_mode:
        name: Preset mode
        required: true
        example: Low
    sequence:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ preset_mode == 'Low' }}"
            sequence:
              - action: switch.turn_off
                target:
                  entity_id: switch.whf_speed_a
              - action: switch.turn_off
                target:
                  entity_id: switch.whf_speed_b
          - conditions:
              - condition: template
                value_template: "{{ preset_mode == 'Medium' }}"
            sequence:
              - action: switch.turn_on
                target:
                  entity_id: switch.whf_speed_a
              - action: switch.turn_off
                target:
                  entity_id: switch.whf_speed_b
          - conditions:
              - condition: template
                value_template: "{{ preset_mode == 'High' }}"
            sequence:
              - action: switch.turn_on
                target:
                  entity_id: switch.whf_speed_a
              - action: switch.turn_on
                target:
                  entity_id: switch.whf_speed_b

  whf_start_timer:
    alias: House Fan - Start Timer
    mode: restart
    sequence:
      - variables:
          run_hours: "{{ states('input_number.whf_run_hours') | float(1) }}"
          total_minutes: "{{ (run_hours * 60) | round(0) | int }}"
      - action: script.whf_turn_on
      - action: timer.start
        target:
          entity_id: timer.whf_run_timer
        data:
          duration: >-
            {{ '%02d:%02d:00' | format(total_minutes // 60, total_minutes % 60) }}

  whf_stop_timer:
    alias: House Fan - Stop Timer
    mode: restart
    sequence:
      - action: script.whf_turn_off

automation:
  - id: whf_timer_finished_turn_off
    alias: House Fan - Timer Finished Turn Off
    mode: single
    trigger:
      - platform: event
        event_type: timer.finished
        event_data:
          entity_id: timer.whf_run_timer
    action:
      - action: script.whf_turn_off
